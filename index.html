<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국어 × 수학 융합수업 | 활동지 & 교세특</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet" />

  <!-- React 18 + Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1410;
      --paper:  #faf7f2;
      --warm:   #f5ede0;
      --accent: #c0392b;
      --green:  #2c6e49;
      --gold:   #d4a017;
      --muted:  #8b7355;
      --border: #d4c5b0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Gowun Dodum', serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ───────────── TOP NAV ───────────── */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-logo {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .nav-logo span { color: var(--accent); }
    .nav-info { font-size: 0.82rem; color: var(--muted); }

    /* ───────────── LANDING ───────────── */
    .landing {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .landing-left {
      background: var(--ink);
      color: var(--paper);
      padding: 4rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .landing-left::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 280px; height: 280px;
      border: 1px solid rgba(212,160,23,0.25);
      border-radius: 50%;
      pointer-events: none;
    }
    .landing-left::after {
      content: '';
      position: absolute;
      bottom: 40px; right: -80px;
      width: 200px; height: 200px;
      border: 1px solid rgba(192,57,43,0.25);
      border-radius: 50%;
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.8rem;
      font-family: 'Noto Serif KR', serif;
      margin-bottom: 1.2rem;
    }
    .landing-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.2;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }
    .landing-title .gold { color: var(--gold); }
    .landing-sub {
      font-size: 0.93rem;
      color: rgba(250,247,242,0.7);
      line-height: 1.85;
      max-width: 340px;
      position: relative;
      z-index: 1;
    }
    .features { display: flex; flex-direction: column; gap: 0.9rem; position: relative; z-index: 1; }
    .feat {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 0.87rem;
      color: rgba(250,247,242,0.82);
    }
    .feat-num {
      color: var(--gold);
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 1.4rem;
    }

    .landing-right {
      background: var(--warm);
      padding: 4rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .form-heading {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-row.full { grid-template-columns: 1fr; }
    .fgroup { display: flex; flex-direction: column; gap: 0.4rem; }
    .fgroup label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .fgroup input, .fgroup select {
      border: 1.5px solid var(--border);
      background: var(--paper);
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      font-family: 'Gowun Dodum', serif;
      color: var(--ink);
      outline: none;
      border-radius: 2px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .fgroup input:focus, .fgroup select:focus { border-color: var(--ink); }
    .err { color: var(--accent); font-size: 0.76rem; margin-top: 0.15rem; }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 1rem 2rem;
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }

    .teacher-toggle { margin-top: 1.2rem; text-align: center; }
    .teacher-toggle button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Gowun Dodum', serif;
      font-size: 0.82rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .teacher-toggle button:hover { border-color: var(--ink); color: var(--ink); }

    /* ── teacher panel ── */
    .teacher-panel {
      background: var(--ink);
      color: var(--paper);
      padding: 1.8rem;
      margin-top: 1.2rem;
      border-radius: 2px;
    }
    .teacher-panel h3 {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.95rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .sub-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
      cursor: pointer;
      transition: background 0.18s;
    }
    .sub-card:hover { background: rgba(255,255,255,0.1); }
    .sub-card .sc-name { font-weight: 600; font-size: 0.93rem; }
    .sub-card .sc-meta { font-size: 0.76rem; color: rgba(250,247,242,0.55); margin-top: 0.25rem; }
    .no-sub { font-size: 0.83rem; color: rgba(250,247,242,0.45); }

    /* ───────────── WORKSHEET ───────────── */
    .ws-wrap { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .ws-header {
      text-align: center;
      padding: 2.5rem 0 2rem;
      border-bottom: 3px double var(--border);
      margin-bottom: 2.5rem;
    }
    .ws-school { font-family:'Noto Serif KR',serif; font-size:0.82rem; letter-spacing:0.2em; color:var(--muted); margin-bottom:0.4rem; }
    .ws-title  { font-family:'Black Han Sans',sans-serif; font-size:2rem; margin-bottom:0.25rem; }
    .ws-sub    { font-size:0.88rem; color:var(--muted); margin-bottom:1.4rem; }
    .ws-info-box {
      display: inline-flex;
      gap: 2rem;
      border: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      font-size: 0.87rem;
      background: var(--warm);
    }
    .ws-info-box span { color: var(--muted); margin-right: 0.3rem; }

    .completion-bar { margin-bottom: 2rem; }
    .completion-text {
      text-align: center;
      font-size: 0.87rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      background: var(--warm);
      border: 1px solid var(--border);
      padding: 0.6rem;
    }
    .completion-text strong { color: var(--ink); }
    .prog-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); transition: width 0.4s ease; }

    .q-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:2rem; }
    .q-tab {
      padding: 0.38rem 0.85rem;
      font-size: 0.8rem;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      font-family: 'Gowun Dodum', serif;
      color: var(--muted);
      transition: all 0.14s;
    }
    .q-tab.active          { background: var(--ink);   color: var(--paper); border-color: var(--ink); }
    .q-tab.done            { border-color: var(--green); color: var(--green); }
    .q-tab.done.active     { background: var(--green); color: var(--paper); border-color: var(--green); }

    .q-card {
      background: var(--paper);
      border: 1.5px solid var(--border);
      padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
      animation: fadeUp 0.28s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .q-badge {
      position: absolute;
      top: -1px; right: 1.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.68rem;
      padding: 0.2rem 0.55rem;
      font-family: 'Noto Serif KR', serif;
    }
    .q-num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 2.4rem;
      color: var(--border);
      line-height: 1;
      float: left;
      margin-right: 1rem;
      margin-top: -0.3rem;
    }
    .q-inner { overflow: hidden; }
    .q-title-row { display:flex; align-items:baseline; gap:0.6rem; margin-bottom:0.7rem; }
    .q-title { font-family:'Noto Serif KR',serif; font-size:1.12rem; font-weight:700; }
    .q-subj-tag { font-size:0.7rem; border:1px solid var(--gold); color:var(--gold); padding:0.12rem 0.45rem; letter-spacing:0.04em; }
    .rubric-row { display:flex; gap:0.45rem; flex-wrap:wrap; margin-bottom:1rem; }
    .rubric-tag { font-size:0.7rem; background:rgba(44,110,73,0.1); color:var(--green); border:1px solid rgba(44,110,73,0.3); padding:0.18rem 0.55rem; border-radius:2px; }
    .q-text {
      font-size: 0.92rem;
      line-height: 1.82;
      color: #3a3028;
      white-space: pre-line;
      background: var(--warm);
      padding: 1rem 1.2rem;
      border-left: 3px solid var(--gold);
      margin-bottom: 1.1rem;
    }
    .answer-area {
      width: 100%;
      min-height: 155px;
      border: 1.5px solid var(--border);
      padding: 1rem;
      font-family: 'Gowun Dodum', serif;
      font-size: 0.92rem;
      line-height: 1.9;
      resize: vertical;
      background: #fffdf9;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .answer-area:focus { border-color: var(--ink); }
    .char-count { text-align:right; font-size:0.77rem; color:var(--muted); margin-top:0.28rem; }
    .char-count.warn { color: var(--accent); }

    .ws-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .btn-nav {
      background: none;
      border: 1.5px solid var(--border);
      padding: 0.6rem 1.2rem;
      font-family: 'Gowun Dodum', serif;
      font-size: 0.88rem;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.14s;
    }
    .btn-nav:hover { border-color:var(--ink); background:var(--warm); }
    .btn-nav:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      font-family: 'Noto Serif KR', serif;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.03em;
    }
    .btn-submit:hover { background:#a93226; transform:translateY(-1px); }

    /* ───────────── REVIEW ───────────── */
    .review-wrap { max-width:860px; margin:0 auto; padding:3rem 1.5rem 4rem; }
    .page-header { text-align:center; margin-bottom:3rem; }
    .page-header h1 { font-family:'Black Han Sans',sans-serif; font-size:1.9rem; margin-bottom:0.4rem; }
    .page-header p  { color:var(--muted); font-size:0.88rem; }

    .review-list { display:flex; flex-direction:column; gap:1.4rem; margin-bottom:2.5rem; }
    .rev-card { border:1px solid var(--border); overflow:hidden; }
    .rev-card-head {
      background: var(--ink);
      color: var(--paper);
      padding: 0.65rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.86rem;
    }
    .rev-card-head strong { font-family:'Noto Serif KR',serif; font-size:0.98rem; }
    .rev-card-body { padding:1rem 1.2rem; font-size:0.9rem; line-height:1.82; background:#fffdf9; white-space:pre-wrap; color:#3a3028; }

    .teacher-note {
      background: var(--warm);
      border: 2px dashed var(--border);
      padding: 1.4rem;
      margin-bottom: 2rem;
    }
    .teacher-note h3 { font-family:'Noto Serif KR',serif; font-size:0.97rem; color:var(--muted); margin-bottom:0.7rem; }
    .teacher-note textarea {
      width: 100%;
      height: 96px;
      border: 1px solid var(--border);
      padding: 0.75rem;
      font-family: 'Gowun Dodum', serif;
      font-size: 0.9rem;
      resize: vertical;
      background: var(--paper);
      color: var(--ink);
      outline: none;
    }

    .btn-generate {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, var(--ink) 0%, #3a2a1a 100%);
      color: var(--gold);
      border: 2px solid var(--gold);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.08rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-generate:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.28); }
    .btn-generate:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    /* ───────────── RESULT ───────────── */
    .result-wrap { max-width:800px; margin:0 auto; padding:3rem 1.5rem 4rem; }
    .result-header { text-align:center; margin-bottom:3rem; }
    .result-header::before {
      content:'';
      display:block;
      width:60px; height:2px;
      background:var(--gold);
      margin:0 auto 1.4rem;
    }
    .result-header h1 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; margin-bottom:0.5rem; }
    .result-meta { display:flex; justify-content:center; gap:2rem; font-size:0.84rem; color:var(--muted); flex-wrap:wrap; }
    .result-meta strong { color:var(--ink); }

    .seteuk-box {
      background: #fffdf9;
      border: 2px solid var(--ink);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      box-shadow: 6px 6px 0 var(--ink);
    }
    .seteuk-box::before {
      content: '세부능력 및 특기사항';
      position: absolute;
      top: -0.7rem; left: 1.5rem;
      background: var(--paper);
      padding: 0 0.5rem;
      font-family: 'Noto Serif KR', serif;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .seteuk-text { font-size:0.97rem; line-height:2.05; color:var(--ink); white-space:pre-wrap; word-break:keep-all; }
    .seteuk-count { text-align:right; font-size:0.78rem; color:var(--muted); margin-top:0.7rem; }

    .result-actions { display:flex; gap:1rem; flex-wrap:wrap; }
    .btn-copy {
      flex:1; padding:0.85rem;
      background:var(--green); color:#fff; border:none;
      font-family:'Noto Serif KR',serif; font-size:0.93rem; font-weight:600;
      cursor:pointer; transition:all 0.18s; min-width:130px;
    }
    .btn-copy:hover { background:#1e5038; transform:translateY(-1px); }
    .btn-regen {
      flex:1; padding:0.85rem;
      background:none; color:var(--ink); border:2px solid var(--ink);
      font-family:'Noto Serif KR',serif; font-size:0.93rem; font-weight:600;
      cursor:pointer; transition:all 0.18s; min-width:130px;
    }
    .btn-regen:hover { background:var(--ink); color:var(--paper); }
    .btn-home {
      flex:1; padding:0.85rem;
      background:none; color:var(--muted); border:1px solid var(--border);
      font-family:'Gowun Dodum',serif; font-size:0.93rem;
      cursor:pointer; transition:all 0.18s; min-width:130px;
    }
    .btn-home:hover { border-color:var(--ink); color:var(--ink); }

    /* ───────────── OVERLAY ───────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,20,16,0.87);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200;
    }
    .spin {
      width:72px; height:72px;
      border:2px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:1.8rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ov-title { font-family:'Black Han Sans',sans-serif; font-size:1.45rem; color:var(--gold); margin-bottom:0.4rem; }
    .ov-sub   { font-size:0.83rem; color:rgba(255,255,255,0.55); margin-bottom:1.8rem; }
    .ov-track { width:280px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
    .ov-fill  { height:100%; background:var(--gold); transition:width 0.3s ease; }

    /* dots */
    .dots span { animation:blink 1.4s infinite; margin:0 1px; }
    .dots span:nth-child(2) { animation-delay:0.2s; }
    .dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

    /* ───────────── RESPONSIVE ───────────── */
    @media (max-width: 768px) {
      .landing { grid-template-columns:1fr; }
      .landing-left { padding:2.5rem 1.5rem; min-height:auto; }
      .landing-right { padding:2.5rem 1.5rem; }
      .form-row { grid-template-columns:1fr 1fr; }
      .ws-wrap, .review-wrap, .result-wrap { padding:1.5rem 1rem 3rem; }
      .top-nav { padding:0.7rem 1rem; }
      .result-meta { gap:1rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ─── 데이터 ─── */
    const QUESTIONS = [
      {
        id: "q1",
        subject: "국어+수학",
        title: "수학적 글쓰기",
        question: "피타고라스 정리를 처음 배우는 친구에게 설명하는 글을 써보세요. 수식만 쓰지 말고, 비유나 이야기를 활용하여 개념이 왜 성립하는지 이해할 수 있도록 작성하세요.",
        placeholder: "예) 옛날 이집트 사람들은 직각을 만들 때...",
        maxLen: 600,
        rubric: ["개념의 정확성", "비유/이야기 활용", "표현의 명확성", "창의성"],
      },
      {
        id: "q2",
        subject: "국어+수학",
        title: "통계 해석과 논설문",
        question: "아래 가상 데이터를 읽고, 이를 근거로 자신의 주장을 펼치는 짧은 논설문(서론-본론-결론)을 작성하세요.\n\n[데이터] 우리 학교 1학년 학생 200명의 하루 평균 스마트폰 사용 시간: 1시간 미만 12%, 1~3시간 45%, 3~5시간 31%, 5시간 이상 12%",
        placeholder: "서론: 오늘날 청소년의 스마트폰 사용 실태는...",
        maxLen: 700,
        rubric: ["주장의 명확성", "통계 활용 능력", "논리적 구조", "문장 표현력"],
      },
      {
        id: "q3",
        subject: "수학+국어",
        title: "함수의 스토리텔링",
        question: "일차함수 y = 2x + 1 의 그래프가 현실 세계의 어떤 상황을 나타낼 수 있을지 상상하여, 그 상황을 짧은 이야기(내러티브)로 작성하세요. x와 y가 각각 무엇을 의미하는지 명시하고, 기울기(2)와 y절편(1)의 의미도 이야기 속에 자연스럽게 녹여주세요.",
        placeholder: "민준이는 편의점 아르바이트를 시작했다. 시간당...",
        maxLen: 500,
        rubric: ["수학적 정확성", "서사적 창의성", "변수 의미 설명", "자연스러운 통합"],
      },
      {
        id: "q4",
        subject: "국어+수학",
        title: "시와 수열",
        question: "피보나치 수열(1, 1, 2, 3, 5, 8, 13, ...)의 규칙을 이해하고, 이 수열에서 영감을 받은 시 또는 산문시를 창작하세요. 수열의 수학적 아름다움이 작품 속에 드러나도록 표현해 보세요.",
        placeholder: "하나의 씨앗이 / 하나의 뿌리를 내리고...",
        maxLen: 400,
        rubric: ["수열 이해도", "문학적 표현", "창의적 연결", "감수성"],
      },
    ];

    /* ─── 로딩 점 ─── */
    function Dots() {
      return (
        <span className="dots">
          <span>●</span><span>●</span><span>●</span>
        </span>
      );
    }

    /* ─── 메인 앱 ─── */
    function App() {
      const [page, setPage]               = useState("landing");
      const [info, setInfo]               = useState({ name:"", grade:"1학년", cls:"1반", num:"" });
      const [answers, setAnswers]         = useState({});
      const [curQ, setCurQ]               = useState(0);
      const [submitted, setSubmitted]     = useState(null);
      const [seteuk, setSeteuk]           = useState(null);
      const [generating, setGenerating]   = useState(false);
      const [progress, setProgress]       = useState(0);
      const [errors, setErrors]           = useState({});
      const [teacherMode, setTeacherMode] = useState(false);
      const [teacherNote, setTeacherNote] = useState("");
      const [submissions, setSubmissions] = useState([]);
      const [apiKey, setApiKey]           = useState("");
      const [showKeyInput, setShowKeyInput] = useState(false);

      useEffect(() => {
        try {
          const s = localStorage.getItem("융합_제출");
          if (s) setSubmissions(JSON.parse(s));
          const k = localStorage.getItem("융합_apikey");
          if (k) setApiKey(k);
        } catch {}
      }, []);

      /* 학생정보 유효성 */
      const validate = () => {
        const e = {};
        if (!info.name.trim()) e.name = "이름을 입력하세요";
        const n = parseInt(info.num, 10);
        if (!info.num || isNaN(n) || n < 1 || n > 50) e.num = "유효한 번호(1~50)를 입력하세요";
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      /* 활동지 시작 */
      const startWS = () => {
        if (!validate()) return;
        setPage("worksheet");
        setCurQ(0);
      };

      /* 답변 변경 */
      const changeAnswer = (id, val) => setAnswers(p => ({ ...p, [id]: val }));

      /* 제출 */
      const submitWS = () => {
        const bad = QUESTIONS.filter(q => (answers[q.id]||"").trim().length < 30);
        if (bad.length) {
          alert("다음 문항의 답변이 너무 짧습니다 (최소 30자):\n" + bad.map(q => q.title).join(", "));
          return;
        }
        const data = { info, answers, at: new Date().toLocaleString("ko-KR") };
        setSubmitted(data);
        const next = [...submissions, data];
        setSubmissions(next);
        try { localStorage.setItem("융합_제출", JSON.stringify(next)); } catch {}
        setPage("review");
      };

      /* 교세특 생성 */
      const generate = async () => {
        let key = apiKey;
        if (!key) {
          key = prompt("Anthropic API 키를 입력하세요.\n(입력한 키는 브라우저에 저장됩니다)");
          if (!key) return;
          setApiKey(key);
          try { localStorage.setItem("융합_apikey", key); } catch {}
        }

        setGenerating(true);
        setSeteuk(null);
        setProgress(0);

        const timer = setInterval(() => setProgress(p => Math.min(p + Math.random() * 9, 88)), 400);

        const prompt = `당신은 고등학교 교사입니다. 학생이 제출한 국어-수학 융합수업 활동지를 바탕으로 교과학습발달상황 세부능력 및 특기사항(교세특)을 작성해주세요.

[학생 정보]
이름: ${submitted.info.name}
학년/반/번호: ${submitted.info.grade} ${submitted.info.cls} ${submitted.info.num}번

[활동지 답변]
${QUESTIONS.map(q => `▶ ${q.title} (${q.subject})\n문항: ${q.question}\n학생 답변: ${submitted.answers[q.id]||"(미작성)"}`).join("\n\n")}
${teacherNote ? `\n[교사 추가 관찰 사항]\n${teacherNote}` : ""}

[교세특 작성 지침]
1. 500자 내외로 작성
2. 학생의 실제 답변 내용을 구체적으로 언급
3. 국어 역량(글쓰기, 표현력, 논리적 구조)과 수학 역량(개념 이해, 적용력)을 모두 평가
4. 융합적 사고력, 창의성, 탐구 태도를 서술
5. 학생의 강점을 중심으로 서술하되, 성장 가능성도 언급
6. 교육부 교세특 양식에 맞게 3인칭으로 서술
7. 학생 이름 대신 "해당 학생" 또는 "본 학생"으로 표현

교세특 내용만 작성하고 다른 설명은 쓰지 마세요.`;

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role:"user", content: prompt }],
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const text = (data.content||[]).map(c => c.text||"").join("") || "생성 결과가 없습니다.";
          clearInterval(timer);
          setProgress(100);
          setTimeout(() => { setSeteuk(text); setGenerating(false); setPage("result"); }, 450);
        } catch (err) {
          clearInterval(timer);
          setGenerating(false);
          setSeteuk("오류가 발생했습니다: " + err.message);
          setPage("result");
        }
      };

      /* 처음으로 리셋 */
      const reset = () => {
        setPage("landing");
        setInfo({ name:"", grade:"1학년", cls:"1반", num:"" });
        setAnswers({});
        setCurQ(0);
        setSubmitted(null);
        setSeteuk(null);
        setTeacherNote("");
        setErrors({});
        setTeacherMode(false);
      };

      const doneCount = QUESTIONS.filter(q => (answers[q.id]||"").trim().length >= 30).length;
      const pct = (doneCount / QUESTIONS.length) * 100;

      /* ─── OVERLAY ─── */
      const Overlay = () => (
        <div className="overlay">
          <div className="spin" />
          <div className="ov-title">교세특 생성 중</div>
          <div className="ov-sub">AI가 학생의 답변을 분석하고 있습니다 <Dots /></div>
          <div className="ov-track"><div className="ov-fill" style={{width: progress+"%"}} /></div>
        </div>
      );

      /* ─── LANDING ─── */
      if (page === "landing") return (
        <>
          {generating && <Overlay />}
          <div className="landing">
            {/* 왼쪽 */}
            <div className="landing-left">
              <div>
                <div className="badge">고등학교 교육과정</div>
                <h1 className="landing-title">
                  국어 <span className="gold">×</span> 수학<br />융합수업
                </h1>
                <p className="landing-sub">
                  언어와 수리의 경계를 넘어, 두 교과의 본질적 사고를 하나로 연결하는 창의·융합 학습 경험을 제공합니다.
                </p>
              </div>
              <div className="features">
                {[
                  ["01", "4개의 융합 활동 문항으로 구성된 활동지 작성"],
                  ["02", "제출 후 AI가 답변을 분석하여 교세특 초안 생성"],
                  ["03", "교사 관찰 사항 추가로 맞춤형 교세특 완성"],
                  ["04", "생성된 교세특 복사 및 수정 후 바로 활용 가능"],
                ].map(([n, t]) => (
                  <div key={n} className="feat">
                    <span className="feat-num">{n}</span>
                    <span>{t}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 오른쪽 */}
            <div className="landing-right">
              {!teacherMode ? (
                <>
                  <div className="form-heading">학생 정보 입력</div>

                  <div className="form-row full">
                    <div className="fgroup">
                      <label>이름</label>
                      <input type="text" placeholder="홍길동"
                        value={info.name}
                        onChange={e => setInfo(p=>({...p, name:e.target.value}))} />
                      {errors.name && <span className="err">{errors.name}</span>}
                    </div>
                  </div>

                  <div className="form-row">
                    <div className="fgroup">
                      <label>학년</label>
                      <select value={info.grade} onChange={e=>setInfo(p=>({...p,grade:e.target.value}))}>
                        {["1학년","2학년","3학년"].map(o=><option key={o}>{o}</option>)}
                      </select>
                    </div>
                    <div className="fgroup">
                      <label>반</label>
                      <select value={info.cls} onChange={e=>setInfo(p=>({...p,cls:e.target.value}))}>
                        {Array.from({length:12},(_,i)=>`${i+1}반`).map(o=><option key={o}>{o}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="form-row full">
                    <div className="fgroup">
                      <label>번호</label>
                      <input type="number" min="1" max="50" placeholder="1"
                        value={info.num}
                        onChange={e=>setInfo(p=>({...p,num:e.target.value}))} />
                      {errors.num && <span className="err">{errors.num}</span>}
                    </div>
                  </div>

                  {/* API Key 입력 (선택) */}
                  <div className="form-row full" style={{marginTop:"0.3rem"}}>
                    <div className="fgroup">
                      <label>Anthropic API Key <span style={{color:"var(--muted)",fontWeight:400,textTransform:"none"}}>(교세특 생성 시 필요)</span></label>
                      <input type="password" placeholder="sk-ant-..."
                        value={apiKey}
                        onChange={e=>{
                          setApiKey(e.target.value);
                          try{localStorage.setItem("융합_apikey",e.target.value);}catch{}
                        }} />
                    </div>
                  </div>

                  <button className="btn-primary" onClick={startWS}>활동지 시작하기 →</button>

                  <div className="teacher-toggle">
                    <button onClick={()=>setTeacherMode(true)}>교사 모드 →</button>
                  </div>
                </>
              ) : (
                <>
                  <div className="form-heading">교사 모드</div>
                  <div className="teacher-panel">
                    <h3>제출된 활동지 목록 ({submissions.length}건)</h3>
                    {submissions.length === 0
                      ? <p className="no-sub">아직 제출된 활동지가 없습니다.</p>
                      : submissions.map((s, i) => (
                          <div key={i} className="sub-card" onClick={()=>{
                            setSubmitted(s);
                            setInfo(s.info);
                            setAnswers(s.answers);
                            setPage("review");
                          }}>
                            <div className="sc-name">{s.info.name}</div>
                            <div className="sc-meta">{s.info.grade} {s.info.cls} {s.info.num}번 · {s.at}</div>
                          </div>
                        ))
                    }
                  </div>
                  <div className="teacher-toggle">
                    <button onClick={()=>setTeacherMode(false)}>← 학생 모드</button>
                  </div>
                </>
              )}
            </div>
          </div>
        </>
      );

      /* ─── WORKSHEET ─── */
      if (page === "worksheet") {
        const q = QUESTIONS[curQ];
        const cnt = (answers[q.id]||"").length;
        return (
          <>
            {generating && <Overlay />}
            <nav className="top-nav">
              <div className="nav-logo" onClick={reset}>국어<span>×</span>수학 융합수업</div>
              <div className="nav-info">{info.name} · {info.grade} {info.cls} {info.num}번</div>
            </nav>
            <div className="ws-wrap">
              <div className="ws-header">
                <div className="ws-school">고등학교 교과 융합 활동지</div>
                <h1 className="ws-title">국어 × 수학 통합 수업</h1>
                <p className="ws-sub">언어와 수리의 경계를 넘는 창의·융합 활동</p>
                <div className="ws-info-box">
                  <div><span>이름</span>{info.name}</div>
                  <div><span>학년반</span>{info.grade} {info.cls}</div>
                  <div><span>번호</span>{info.num}번</div>
                </div>
              </div>

              <div className="completion-bar">
                <div className="completion-text">
                  <strong>{doneCount}/{QUESTIONS.length}</strong>개 문항 작성 완료
                  {doneCount === QUESTIONS.length && " ✓ 모든 문항 완료!"}
                </div>
                <div className="prog-track">
                  <div className="prog-fill" style={{width: pct+"%"}} />
                </div>
              </div>

              <div className="q-tabs">
                {QUESTIONS.map((qq, i) => {
                  const done = (answers[qq.id]||"").trim().length >= 30;
                  return (
                    <button key={qq.id}
                      className={"q-tab" + (curQ===i?" active":"") + (done?" done":"")}
                      onClick={()=>setCurQ(i)}>
                      {i+1}. {qq.title}{done&&" ✓"}
                    </button>
                  );
                })}
              </div>

              <div className="q-card">
                <div className="q-badge">{q.subject}</div>
                <span className="q-num">0{curQ+1}</span>
                <div className="q-inner">
                  <div className="q-title-row">
                    <span className="q-title">{q.title}</span>
                    <span className="q-subj-tag">{q.subject}</span>
                  </div>
                  <div className="rubric-row">
                    {q.rubric.map(r=><span key={r} className="rubric-tag">◆ {r}</span>)}
                  </div>
                  <div className="q-text">{q.question}</div>
                  <textarea className="answer-area"
                    placeholder={q.placeholder}
                    value={answers[q.id]||""}
                    maxLength={q.maxLen}
                    onChange={e=>changeAnswer(q.id, e.target.value)} />
                  <div className={"char-count"+(cnt>q.maxLen*0.9?" warn":"")}>
                    {cnt} / {q.maxLen}자
                  </div>
                </div>
              </div>

              <div className="ws-nav">
                <button className="btn-nav" disabled={curQ===0} onClick={()=>setCurQ(p=>p-1)}>← 이전</button>
                {curQ < QUESTIONS.length-1
                  ? <button className="btn-nav" onClick={()=>setCurQ(p=>p+1)}>다음 →</button>
                  : <button className="btn-submit" onClick={submitWS}>활동지 제출하기 →</button>
                }
              </div>
            </div>
          </>
        );
      }

      /* ─── REVIEW ─── */
      if (page === "review" && submitted) return (
        <>
          {generating && <Overlay />}
          <nav className="top-nav">
            <div className="nav-logo" onClick={reset}>국어<span>×</span>수학 융합수업</div>
            <div className="nav-info">{submitted.info.name} · {submitted.at}</div>
          </nav>
          <div className="review-wrap">
            <div className="page-header">
              <h1>활동지 제출 완료</h1>
              <p>아래 답변을 확인하고 AI 교세특 생성을 진행하세요</p>
            </div>

            <div className="review-list">
              {QUESTIONS.map(q => (
                <div key={q.id} className="rev-card">
                  <div className="rev-card-head">
                    <strong>{q.title}</strong>
                    <span>{q.subject}</span>
                  </div>
                  <div className="rev-card-body">
                    {submitted.answers[q.id]||"(미작성)"}
                  </div>
                </div>
              ))}
            </div>

            <div className="teacher-note">
              <h3>📝 교사 추가 관찰 사항 (선택)</h3>
              <textarea
                placeholder="예) 수업 중 적극적으로 발표하였으며, 모둠 활동에서 리더십을 발휘함. 수학 개념을 문학적 표현과 연결짓는 능력이 뛰어남..."
                value={teacherNote}
                onChange={e=>setTeacherNote(e.target.value)} />
            </div>

            <button className="btn-generate" onClick={generate} disabled={generating}>
              ✦ AI 교세특 자동 생성하기 ✦
            </button>
          </div>
        </>
      );

      /* ─── RESULT ─── */
      if (page === "result" && seteuk && submitted) return (
        <>
          <nav className="top-nav">
            <div className="nav-logo" onClick={reset}>국어<span>×</span>수학 융합수업</div>
            <div className="nav-info">교세특 생성 완료</div>
          </nav>
          <div className="result-wrap">
            <div className="result-header">
              <h1>교세특 생성 완료</h1>
              <div className="result-meta">
                <span>학생: <strong>{submitted.info.name}</strong></span>
                <span>{submitted.info.grade} {submitted.info.cls} {submitted.info.num}번</span>
                <span>생성일: <strong>{new Date().toLocaleDateString("ko-KR")}</strong></span>
              </div>
            </div>

            <div className="seteuk-box">
              <p className="seteuk-text">{seteuk}</p>
              <div className="seteuk-count">{seteuk.length}자</div>
            </div>

            <div className="result-actions">
              <button className="btn-copy" onClick={()=>{
                navigator.clipboard.writeText(seteuk)
                  .then(()=>alert("클립보드에 복사되었습니다."))
                  .catch(()=>alert("복사에 실패했습니다. 직접 선택하여 복사해 주세요."));
              }}>클립보드 복사</button>
              <button className="btn-regen" onClick={()=>{ setSeteuk(null); setPage("review"); }}>다시 생성하기</button>
              <button className="btn-home" onClick={reset}>처음으로</button>
            </div>
          </div>
        </>
      );

      return null;
    }

    /* ─── 마운트 ─── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
