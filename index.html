const {useState,useEffect,useRef,useCallback}=React;

function AG({value,onChange,placeholder,style={},minH=52}){
  const r=useRef(null);
  useEffect(()=>{if(r.current){r.current.style.height="auto";r.current.style.height=Math.max(r.current.scrollHeight,minH)+"px";}},[value]);
  return <textarea ref={r} className="ag" value={value||""} onChange={onChange} placeholder={placeholder} style={{minHeight:minH,...style}}/>;
}

/* ══ 구글 드라이브 업로드 (Apps Script 경유) ══ */
function extractFolderId(url){
  if(!url||!url.startsWith("http"))return null;
  const m=url.match(/\/folders\/([a-zA-Z0-9_-]{20,})/);
  return m?m[1]:null;
}

/**
 * Apps Script 웹앱으로 이미지 업로드
 * @param {string} appsScriptUrl - 배포된 Apps Script 웹앱 URL
 * @param {string} base64Data    - base64 이미지 (data:... 포함 가능)
 * @param {string} rootFolderId  - 상위 폴더 ID (없으면 내 드라이브 루트)
 * @param {string} studentName   - 학생 이름 (폴더명으로 사용)
 * @param {string} studentId     - 학번
 * @param {string} fileName      - 저장할 파일명
 */
async function uploadToDrive(appsScriptUrl, base64Data, rootFolderId, studentName, studentId, fileName){
  if(!appsScriptUrl||!base64Data||!studentName||!fileName)return{ok:false,error:"파라미터 부족"};
  try{
    const fd=new FormData();
    if(rootFolderId) fd.append("rootFolderId",rootFolderId);
    fd.append("studentName",studentName);
    fd.append("studentId",studentId||"");
    fd.append("fileName",fileName);
    fd.append("base64Data",base64Data);
    fd.append("mimeType","image/jpeg");
    // no-cors: 응답 읽기 불가지만 업로드는 정상 처리됨
    await fetch(appsScriptUrl,{method:"POST",mode:"no-cors",body:fd});
    return{ok:true};
  }catch(e){
    console.warn("Drive 업로드 오류:",e.message);
    return{ok:false,error:e.message};
  }
}

/**
 * 활동 제출 시 모든 사진을 학생 이름 폴더에 업로드
 * questionPhoto(3단계) + subImgs(추가문항 수기 사진) 모두 포함
 */
async function uploadAllPhotosForActivity({appsScriptUrl, rootUrl, driveUrls, stuId, stuName, qid, qTitle, qIdx, answers}){
  if(!appsScriptUrl) return;
  // rootFolderId: driveUrls[stuId] 우선, 없으면 rootUrl
  const folderUrl = driveUrls[stuId] || rootUrl;
  const rootFolderId = extractFolderId(folderUrl) || null;
  const ans = answers[qid]||{};
  const actLabel = `활동${qIdx+1}_${(qTitle||qid).replace(/[^\w가-힣]/g,"").slice(0,10)}`;
  const uploads=[];

  // 3단계: 문항 페이지 전체 사진
  if(ans.questionPhoto){
    uploads.push(uploadToDrive(
      appsScriptUrl, ans.questionPhoto, rootFolderId,
      stuName, stuId,
      `${stuId}_${stuName}_${actLabel}_문항전체.jpg`
    ));
  }
  // 2단계: 추가문항 수기 사진들
  if(ans.subImgs){
    Object.entries(ans.subImgs).forEach(([si, imgData])=>{
      if(imgData){
        uploads.push(uploadToDrive(
          appsScriptUrl, imgData, rootFolderId,
          stuName, stuId,
          `${stuId}_${stuName}_${actLabel}_추가${Number(si)+1}.jpg`
        ));
      }
    });
  }
  if(uploads.length===0) return;
  // 병렬 업로드 (no-cors이므로 결과 확인 불가, 낙관적 처리)
  await Promise.allSettled(uploads);
}

async function compressImage(dataUrl,maxW=600,quality=0.7){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{const scale=Math.min(1,maxW/img.width),w=Math.round(img.width*scale),h=Math.round(img.height*scale);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",quality));};
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}

  if(engine==="Gemini"){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${keys.gemini}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1200}})});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates?.[0]?.content?.parts?.[0]?.text||"";}

  throw new Error("알 수 없는 AI 엔진");
}

            ):(
              <button onClick={()=>submitActivity(qid)} disabled={!!submitting[qid]} style={{...btn(`linear-gradient(135deg,${isRejected?"#c05c1a,#e67e22":cv.lav+",#9b59b6"})`),width:"100%",padding:".85rem",fontSize:".95rem",fontWeight:800,borderRadius:10,opacity:submitting[qid]?.6:1}}>
                {submitting[qid]?"⏳ 제출 중...":(isRejected?"↺ 다시 제출하기":"이 활동 제출하기 ✓")}
              </button>
            )}
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:"1.1rem",borderTop:`1.5px solid ${cv.border}`}}>
            <button disabled={curQ===0} onClick={()=>{setCurQ(p=>p-1);setVideoOpen(false);}} style={{...btn("#fff",cv.ink2),border:`1.5px solid ${cv.border2}`,borderRadius:20,padding:".5rem 1.1rem",opacity:curQ===0?.35:1}}>← 이전</button>
            {!isLast?<button onClick={()=>{setCurQ(p=>p+1);setVideoOpen(false);}} style={{...btn("#fff",cv.ink2),border:`1.5px solid ${cv.border2}`,borderRadius:20,padding:".5rem 1.1rem"}}>다음 →</button>
            :<button onClick={()=>setCurQ(0)} style={{...btn(cv.lavLt,cv.lav),border:`1.5px solid ${cv.lavMd}`,borderRadius:20,padding:".5rem 1.1rem"}}>← 첫 문항으로</button>}
          </div>
        </div>
      </div>
    );
  }

  /* ════ REVIEW ════ */
  if(page==="review"&&submitted)return(
    <div style={{background:cv.bg,minHeight:"100vh"}}>
      {generating&&<Spinner prog={genProg}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",height:52,background:"#fff",borderBottom:`2px solid ${cv.border}`,position:"sticky",top:0,zIndex:80}}>
        <span onClick={reset} style={{fontWeight:800,fontSize:".95rem",cursor:"pointer",color:cv.ink}}>화법과 작문 × 확률과 통계</span>
        <span style={{fontSize:".76rem",color:cv.muted}}>{submitted.stuName}</span>
      </div>
      <div style={{maxWidth:780,margin:"0 auto",padding:"1.4rem 1rem 4rem"}}>
        <div style={{textAlign:"center",marginBottom:"1.6rem"}}><h1 style={{fontWeight:800,fontSize:"1.45rem",color:cv.ink,marginBottom:".3rem"}}>활동지 제출 완료 🎉</h1><div style={{fontSize:".82rem",color:cv.muted}}>모든 활동이 제출되었습니다</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:".85rem",marginBottom:"1.4rem"}}>
          {questions.map(q=>{const a=submitted.answers[q.id]||{};return(<div key={q.id} style={crd()}><div style={{background:`linear-gradient(90deg,${cv.lavMd},${cv.mintMd})`,padding:".58rem 1rem",margin:"-1.2rem -1.2rem .9rem",display:"flex",justifyContent:"space-between",borderRadius:"11px 11px 0 0"}}><strong style={{fontSize:".9rem",color:cv.ink}}>{q.title}</strong><span style={{fontSize:".74rem",color:cv.ink2}}>{q.subject}</span></div><div style={{fontSize:".88rem",lineHeight:1.85,whiteSpace:"pre-wrap",color:cv.ink2}}>{a.text||"(미작성)"}</div></div>);})}
        </div>
        <div style={{...crd(),marginBottom:"1.3rem"}}><div style={{fontWeight:700,fontSize:".92rem",color:cv.ink2,marginBottom:".6rem"}}>📝 교사 추가 관찰</div><textarea style={{...inp(),height:78,resize:"vertical",background:"#fafcff",lineHeight:1.75}} value={tNote} onChange={e=>setTNote(e.target.value)} placeholder="수업 중 관찰 사항..."/></div>
        <button onClick={generate} disabled={generating} style={{...btn(`linear-gradient(135deg,${cv.lav},${cv.mint})`),width:"100%",padding:".9rem",fontSize:".97rem",borderRadius:10,opacity:generating?.6:1}}>✦ AI 교세특 자동 생성하기 ✦</button>
      </div>
    </div>
  );

  /* ════ RESULT ════ */
  if(page==="result"&&seteuk&&submitted)return(
    <div style={{background:cv.bg,minHeight:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1rem",height:52,background:"#fff",borderBottom:`2px solid ${cv.border}`,position:"sticky",top:0,zIndex:80}}>
        <span onClick={reset} style={{fontWeight:800,fontSize:".95rem",cursor:"pointer",color:cv.ink}}>화법과 작문 × 확률과 통계</span>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"2rem 1rem 4rem"}}>
        <div style={{textAlign:"center",marginBottom:"1.6rem"}}><h1 style={{fontWeight:800,fontSize:"1.45rem",color:cv.ink,marginBottom:".3rem"}}>교세특 생성 완료</h1></div>
        <div style={{...crd({padding:"1.8rem 2rem"}),position:"relative",marginBottom:"1.3rem"}}>
          <div style={{position:"absolute",top:-11,left:"1.2rem",background:cv.lavMd,padding:".08rem .55rem",fontSize:".68rem",fontWeight:700,color:cv.ink,borderRadius:18}}>세부능력 및 특기사항</div>
          <p style={{fontSize:".92rem",lineHeight:2.05,color:cv.ink,whiteSpace:"pre-wrap",wordBreak:"keep-all"}}>{seteuk}</p>
          <div style={{textAlign:"right",marginTop:".8rem",paddingTop:".7rem",borderTop:`1px solid ${cv.border}`,fontSize:".76rem",color:cv.muted}}>{seteuk.length}자</div>
        </div>
        <div style={{display:"flex",gap:".7rem",flexWrap:"wrap"}}>
          <button onClick={()=>navigator.clipboard.writeText(seteuk).then(()=>alert("복사!")).catch(()=>{})} style={{...btn(`linear-gradient(135deg,${cv.mint},#27ae60)`),flex:1,padding:".75rem",minWidth:90}}>📋 복사</button>
          <button onClick={()=>{setSeteuk(null);setPage("review");}} style={{...btn("#fff",cv.ink),border:`1.5px solid ${cv.border2}`,flex:1,padding:".75rem",minWidth:90}}>↺ 재생성</button>
          <button onClick={reset} style={{...btn("#fff",cv.muted),border:`1px solid ${cv.border}`,flex:1,padding:".75rem",minWidth:90}}>처음으로</button>
        </div>
      </div>
    </div>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
